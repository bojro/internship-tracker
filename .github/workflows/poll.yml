name: poll-internships
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min (GitHub may delay under load)
  workflow_dispatch: {}       # manual "run now" button
concurrency:
  group: poll
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Poll sources + corroborate
        run: node scripts/poll.mjs
      - name: Fan out alerts (Discord)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/alert.mjs
      - name: Email alert (Gmail SMTP, only if bodies exist)
        if: hashFiles('email-body.txt') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: Internship Tracker <${{ secrets.GMAIL_USER }}>
          to: ${{ secrets.ALERT_EMAIL }}
          subject: file://email-subject.txt
          body: file://email-body.txt
      - name: Commit postings.json if changed
        run: |
          git config user.name  "internship-bot"
          git config user.email "bot@users.noreply.github.com"
          rm -f alerts.json email-subject.txt email-body.txt poll.mjs
          git add postings.json
          git diff --staged --quiet || git commit -m "postings: $(date -u +%FT%TZ)"
          git push
